name: Android Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar URL pública da API
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::Configure VITE_API_URL em Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm install

      - name: Validar TypeScript do frontend
        run: npm run typecheck --workspace frontend

      - name: Gerar frontend para Android
        run: npm run build:android --workspace frontend

      - name: Adicionar plataforma Android
        working-directory: frontend
        run: npx cap add android

      - name: Sincronizar Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Gerar APK debug
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpc-exchange-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
